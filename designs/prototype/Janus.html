<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Janus — Rental Application Reviewer</title>

<!-- Geist for everything (modern, neutral, great tabular nums) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="tokens.css" />

<style>
  /* Page-level — the off-canvas paper background that holds the prototype */
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: #e8e3d8;
    font-family: var(--font-sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'cv11', 'ss01';
  }
  button { font-family: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  * { box-sizing: border-box; }
  /* tabular nums for any element with .tnum */
  .tnum, .nums { font-variant-numeric: tabular-nums; }
</style>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- order matters: frames + tweaks panel → shared UI + data → screen sets → app shell -->
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/browser-window.jsx"></script>
<script type="text/babel" src="frames/tweaks-panel.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="data.js"></script>
<script type="text/babel" src="applicant.jsx"></script>
<script type="text/babel" src="reviewer.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
